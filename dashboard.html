<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPulse - Live Market Data with Historical Charts</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .status-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideDown 0.8s ease-out;
        }

        .status-label {
            font-size: 0.9em;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-value {
            font-size: 1.4em;
            font-weight: bold;
            margin-top: 5px;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background-color: #4ade80;
            box-shadow: 0 0 10px #4ade80;
        }

        .status-dot.disconnected {
            background-color: #ef4444;
            animation: none;
        }

        .tickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .ticker-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease-out backwards;
            border-left: 5px solid #667eea;
        }

        .ticker-card:nth-child(1) { animation-delay: 0.1s; }
        .ticker-card:nth-child(2) { animation-delay: 0.2s; }
        .ticker-card:nth-child(3) { animation-delay: 0.3s; }
        .ticker-card:nth-child(4) { animation-delay: 0.4s; }

        .ticker-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .ticker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .ticker-info h2 {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 3px;
        }

        .ticker-sector {
            font-size: 0.85em;
            color: #666;
        }

        .ticker-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            background: #f0f0f0;
            color: #666;
        }

        .ticker-status.connected {
            background: #d1fae5;
            color: #065f46;
        }

        .ticker-status.disconnected {
            background: #fee2e2;
            color: #991b1b;
        }

        .price-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
        }

        .current-price {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .price-change {
            font-size: 1em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .price-change.up {
            color: #10b981;
        }

        .price-change.down {
            color: #ef4444;
        }

        .arrow {
            font-size: 1.2em;
        }

        .chart-container {
            position: relative;
            height: 340px;
            margin: 15px 0;
            padding: 10px;
            background: #f9fafb;
            border-radius: 8px;
        }

        .chart-title {
            font-size: 0.85em;
            color: #666;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chart-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 340px;
            color: #999;
            font-size: 0.9em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }

        .stat {
            background: #f9fafb;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.7em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 50px;
            padding: 20px;
            opacity: 0.8;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 10px currentColor;
            }
            50% {
                box-shadow: 0 0 20px currentColor;
            }
        }

        @media (max-width: 1024px) {
            .tickers-grid {
                grid-template-columns: 1fr;
            }
        }

        .data-source {
            font-size: 0.75em;
            color: #999;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e5e5e5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 MarketPulse</h1>
            <p>Real-Time + Historical Market Data Dashboard</p>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">
                    <span class="status-dot" id="connectionDot"></span>
                    Connection Status
                </div>
                <div class="status-value" id="connectionStatus">Loading...</div>
            </div>
            <div class="status-item">
                <div class="status-label">Live Updates</div>
                <div class="status-value" id="updateCount">0</div>
            </div>
            <div class="status-item">
                <div class="status-label">Historical Points</div>
                <div class="status-value" id="historyCount">Loading...</div>
            </div>
            <div class="status-item">
                <div class="status-label">Active Tickers</div>
                <div class="status-value" id="activeTickers">0/3</div>
            </div>
        </div>

        <div class="tickers-grid" id="tickersContainer"></div>

        <footer>
            MarketPulse • FastAPI + Redis + PostgreSQL + WebSocket
        </footer>
    </div>

    <script>

const API_BASE_URL = "http://localhost:8000";
const WS_BASE_URL = "ws://localhost:8000";

const TICKERS = [
    "TCS",
    "SBIN",
    "SUNPHARMA",
    "MARUTI"
];

const TICKER_INFO = {
    "TCS": "IT/Tech",
    "SBIN": "Banking",
    "SUNPHARMA": "Pharma",
    "MARUTI": "Auto"
};

const state = {
    connections: {},
    data: {},
    charts: {},
    updateCount: 0,
    historyPoints: 0
};

async function loadStats(){

    try{

        const response =
        await fetch(
            `${API_BASE_URL}/stats`
        );

        if(!response.ok)
            return;

        const stats =
        await response.json();

        state.historyPoints =
        stats.historical_points;

        updateStats();

    }

    catch(error){

        console.error(
            error
        );

    }

}

// ============================================================================
// INITIALIZATION
// ============================================================================

async function init() {
    console.log("🚀 Initializing MarketPulse Dashboard...");
    
    // Create ticker cards
    TICKERS.forEach(ticker => {
        state.data[ticker] = {
            price: 0,
            prevPrice: 0,
            change: 0,
            changePercent: 0,
            sequenceId: 0,
            timestamp: null,
            historicalData: []
        };
        createTickerCard(ticker);
    });

    // Load historical data for all tickers
    console.log("📦 Loading historical data from PostgreSQL...");
    for (const ticker of TICKERS) {
        await loadHistoricalData(ticker);
    }
    
    await loadStats();

    setInterval(
        loadStats,
        5000
    );

    // Connect WebSockets
    console.log("🔌 Connecting WebSockets for live updates...");
    TICKERS.forEach(ticker => connectWebSocket(ticker));

    updateConnectionIndicator();
}

// ============================================================================
// HISTORICAL DATA LOADING
// ============================================================================

async function loadHistoricalData(ticker) {
    try {
        console.log(`  → Fetching history for ${ticker}...`);
        
        const response = await fetch(
            `${API_BASE_URL}/history/${ticker}?limit=100`
        );
        
        if (!response.ok) {
            console.warn(`  ✗ Failed to load history for ${ticker}: ${response.status}`);
            initChart(ticker, []);
            return;
        }

        const json = await response.json();
        const ticks = json.ticks || [];
        
        console.log(`  ✓ Loaded ${ticks.length} historical ticks for ${ticker}`);
        
        state.data[ticker].historicalData = ticks;

state.data[ticker].historyCount =
    ticks.length;

const historyEl =
document.getElementById(
`history-${ticker}`
);

if(historyEl)
historyEl.textContent =
ticks.length;

initChart(
ticker,
ticks
);

const loadingEl =
document.getElementById(
`loading-${ticker}`
);

const canvasEl =
document.getElementById(
`chart-${ticker}`
);

if(loadingEl)
loadingEl.style.display =
"none";

if(canvasEl)
canvasEl.style.display =
"block";

updateStats();
        
    } catch (error) {
        console.error(`Failed to load history for ${ticker}:`, error);
        initChart(ticker, []);
    }
}

// ============================================================================
// CHART INITIALIZATION
// ============================================================================

function initChart(ticker, historicalTicks) {
    const canvasId = `chart-${ticker}`;
    const canvas = document.getElementById(canvasId);
    
    if (!canvas) return;

    // Prepare data
    const labels = historicalTicks.map(tick => {
        const date = new Date(tick.timestamp);
        return date.toLocaleTimeString();
    });
    
    const prices = historicalTicks.map(tick => tick.price);

    // Create Chart.js instance
    state.charts[ticker] = new Chart(canvas, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: `${ticker} Price (₹)`,
                data: prices,
                borderColor: '#667eea',
                backgroundColor: 'rgba(102, 126, 234, 0.1)',
                borderWidth: 2,
                pointRadius: 3,
                pointBackgroundColor: '#667eea',
                pointHoverRadius: 5,
                tension: 0.1,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: true,
                    labels: {
                        font: { size: 12 },
                        usePointStyle: true,
                        padding: 15
                    }
                },
                tooltip: {
                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                    padding: 10,
                    titleFont: { size: 13 },
                    bodyFont: { size: 12 }
                }
            },
            scales: {
                x: {
                    grid: { display: false },
                    ticks: { font: { size: 10 } }
                },
                y: {
                    grid: { color: 'rgba(0, 0, 0, 0.05)' },
                    ticks: { font: { size: 10 } }
                }
            }
        }
    });

    console.log(`  ✓ Chart initialized for ${ticker}`);
}

// ============================================================================
// TICKER CARD CREATION
// ============================================================================

function createTickerCard(ticker) {
    const container = document.getElementById("tickersContainer");
    const sector = TICKER_INFO[ticker];

    const card = document.createElement("div");
    card.className = "ticker-card";

    card.innerHTML = `
        <div class="ticker-header">
            <div class="ticker-info">
                <h2>${ticker}</h2>
                <div class="ticker-sector">${sector}</div>
            </div>
            <span id="status-${ticker}" class="ticker-status disconnected">
                Disconnected
            </span>
        </div>

        <div class="price-info">
            <div class="current-price">
                ₹<span id="price-${ticker}">—</span>
            </div>
            <div class="price-change" id="change-text-${ticker}">
                <span class="arrow" id="arrow-${ticker}">—</span>
                <span id="change-value-${ticker}">0.00 (0%)</span>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">📈 Price History + Live Updates</div>
            <div class="chart-loading" id="loading-${ticker}">
                Loading chart...
            </div>
            <canvas id="chart-${ticker}" style="display: none;"></canvas>
        </div>

        <div class="stats-grid">
            <div class="stat">
                <div class="stat-label">Seq ID</div>
                <div class="stat-value" id="seqid-${ticker}">—</div>
            </div>
            <div class="stat">
                <div class="stat-label">Updates</div>
                <div class="stat-value" id="updates-${ticker}">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">CHART POINTS</div>
                <div class="stat-value" id="history-${ticker}">0</div>
            </div>
        </div>

        <div class="data-source">
            📊 PostgreSQL: Historical | 🔴 WebSocket: Live
        </div>
    `;

    container.appendChild(card);
}

// ============================================================================
// WEBSOCKET MANAGEMENT
// ============================================================================

function connectWebSocket(ticker) {
    const url = `${WS_BASE_URL}/ws/${ticker}`;
    console.log(`Connecting WebSocket: ${url}`);

    const ws = new WebSocket(url);

ws.onopen = () => {
    console.log(`✓ WebSocket connected: ${ticker}`);

    state.connections[ticker] = true;

    updateStatus(
        ticker,
        true
    );

    updateConnectionIndicator();

    updateStats();
};

ws.onmessage = (event) => {

    const data =
        JSON.parse(
            event.data
        );

    updateTickerData(
        ticker,
        data
    );

    // live updates

    state.data[ticker]
    .updates++;

    // historical count grows

    state.data[ticker]
    .historyCount =
        (
            state.data[ticker]
            .historyCount || 0
        ) + 1;

    updateStats();
};

    ws.onerror = (err) => {
        console.error(`WebSocket error for ${ticker}:`, err);
    };

    ws.onclose = () => {
        console.log(`WebSocket closed: ${ticker}`);
        state.connections[ticker] = false;
        updateStatus(ticker, false);
        updateConnectionIndicator();
        updateStats();
        
        // Auto-reconnect after 3 seconds
        setTimeout(() => {
            console.log(`Reconnecting WebSocket: ${ticker}...`);
            connectWebSocket(ticker);
        }, 3000);
    };
}

// Handle tab visibility - reconnect when tab becomes active
document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
        console.log("Tab became visible - checking WebSocket connections...");
        TICKERS.forEach(ticker => {
            if (!state.connections[ticker]) {
                console.log(`Reconnecting dead socket: ${ticker}`);
                connectWebSocket(ticker);
            }
        });
    }
});

// ============================================================================
// DATA UPDATES
// ============================================================================

function updateTickerData(ticker, data) {
    const prev = state.data[ticker];
    const change = data.price - prev.price;
    const pct = prev.price ? (change / prev.price) * 100 : 0;

    state.data[ticker] = {
        ...prev,
        price: data.price,
        prevPrice: prev.price,
        change: change,
        changePercent: pct,
        sequenceId: data.sequence_id,
        timestamp: data.timestamp
    };

    state.updateCount++;

    updatePriceDisplay(ticker);
    updateChart(ticker, data);
    updateStats();
}

function updatePriceDisplay(ticker) {
    const d = state.data[ticker];
    const priceEl = document.getElementById(`price-${ticker}`);
    const seqEl = document.getElementById(`seqid-${ticker}`);
    const updatesEl = document.getElementById(`updates-${ticker}`);
    const arrowEl = document.getElementById(`arrow-${ticker}`);
    const changeEl = document.getElementById(`change-value-${ticker}`);
    const changeContainerEl = document.getElementById(`change-text-${ticker}`);

    if (priceEl) priceEl.textContent = d.price.toFixed(2);
    if (seqEl) seqEl.textContent = d.sequenceId;
    if (updatesEl) updatesEl.textContent = parseInt(updatesEl.textContent || 0) + 1;
    
    if (arrowEl) {
        if (d.change > 0) arrowEl.textContent = "↑";
        else if (d.change < 0) arrowEl.textContent = "↓";
        else arrowEl.textContent = "—";
    }
    
    if (changeEl) {
        changeEl.textContent = `${d.change.toFixed(2)} (${d.changePercent.toFixed(2)}%)`;
    }

    if (changeContainerEl) {
        changeContainerEl.className = d.change > 0 ? "price-change up" : 
                                      d.change < 0 ? "price-change down" : "price-change";
    }
}

// ============================================================================
// CHART UPDATES
// ============================================================================

function updateChart(ticker, data) {
    const chart = state.charts[ticker];
    if (!chart) return;

    const time = new Date(data.timestamp).toLocaleTimeString();
    
    // Add new data point
    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(data.price);

    // Keep only last 150 points
    if (chart.data.labels.length > 150) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    // Update chart
    chart.update('none'); // Update without animation for performance
}

// ============================================================================
// STATUS UPDATES
// ============================================================================

function updateStatus(ticker, connected) {

    const el =
        document.getElementById(
            `status-${ticker}`
        );

    if (!el) return;

    el.className =
        connected
        ? "ticker-status connected"
        : "ticker-status disconnected";

    el.textContent =
        connected
        ? "Connected"
        : "Disconnected";

    const loadingEl =
        document.getElementById(
            `loading-${ticker}`
        );

    const canvasEl =
        document.getElementById(
            `chart-${ticker}`
        );

    // ALWAYS show chart once connected

    if (connected) {

        if (loadingEl)
            loadingEl.style.display =
            "none";

        if (canvasEl)
            canvasEl.style.display =
            "block";

        const historyEl =
            document.getElementById(
                `history-${ticker}`
            );

        if (historyEl)
            historyEl.textContent =
            state.data[ticker]
            .historicalData
            .length;
    }
}

function updateStats() {

    const connected =
        Object.values(
            state.connections
        ).filter(
            x => x === true
        ).length;

    document.getElementById(
        "connectionStatus"
    ).textContent =
        connected > 0
        ? `${connected} Connected`
        : "Loading...";

    document.getElementById(
        "updateCount"
    ).textContent =
        state.updateCount;

    document.getElementById(
        "historyCount"
    ).textContent =
        state.historyPoints;

    const totalTickers =
        Object.keys(
            state.connections
        ).length;

    document.getElementById(
        "activeTickers"
    ).textContent =
        `${connected}/${totalTickers}`;
}

// ============================================================================
// STARTUP
// ============================================================================

document.addEventListener("DOMContentLoaded", () => {
    console.log("🎯 MarketPulse Dashboard Started");
    init();
});

    </script>
</body>
</html>
